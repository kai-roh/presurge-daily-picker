name: Intraday Monitor

on:
  schedule:
    # Extended-hours strategy in UTC/KST:
    # - 08-10 UTC: early premarket, lower frequency
    # - 11-17 UTC: late premarket + regular session until 02:55 KST, high frequency
    # - 18-20 UTC: 03:00-05:55 KST quiet-hours observation, alerts muted in code
    # - 21-23/00-01 UTC: postmarket after 06:00 KST, lower frequency
    - cron: "*/15 8-10 * * 1-5"
    - cron: "*/5 11-17 * * 1-5"
    - cron: "*/15 18-20 * * 1-5"
    - cron: "*/10 21-23 * * 1-5"
    - cron: "*/10 0-1 * * 2-6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "store signals without Telegram push"
        required: false
        default: "false"

concurrency:
  group: intraday-monitor
  cancel-in-progress: false

jobs:
  intraday-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      INTRADAY_ENABLED: "1"
      PYTHONUNBUFFERED: "1"
      INTRADAY_MAX_TICKERS: "20"
      INTRADAY_INTERVAL_SECONDS: "300"
      INTRADAY_USE_YFINANCE: "1"
      INTRADAY_USE_FINNHUB_FALLBACK: "1"
      INTRADAY_YFINANCE_PREPOST: "1"
      INTRADAY_INCLUDE_EXTENDED_HOURS: "1"
      INTRADAY_MIN_TIER: "3"
      INTRADAY_MAX_ALERTS_PER_LOOP: "5"
      INTRADAY_BUY_COOLDOWN_MINUTES: "30"
      INTRADAY_REGULAR_SESSION_ONLY: "0"
      INTRADAY_MUTE_QUIET_HOURS: "1"
      INTRADAY_QUIET_START_KST: "03:00"
      INTRADAY_QUIET_END_KST: "06:00"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize schema
        run: python -m src.storage.db --init

      - name: Run intraday monitor once
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m scripts.run_intraday_monitor --once --dry-run
          else
            python -m scripts.run_intraday_monitor --once
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-${{ github.run_id }}
          path: data/*.log
          retention-days: 14
          if-no-files-found: ignore
